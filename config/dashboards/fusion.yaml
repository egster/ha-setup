                              - font-weight: 700
                              - text-align: left
                              - padding-top: 4px
                            label:
                              - font-size: 10px
                              - text-transform: uppercase
                              - letter-spacing: 0.5px
                              - color: "#888"
                              - text-align: left
                            grid:
                              - grid-template-areas: '"i" "n" "l"'
                              - grid-template-rows: auto 1fr auto
                          state:
                            - operator: template
                              value: "[[[ return !!states['binary_sensor.zenwifi_bq16_ca38_wan_status'] && states['binary_sensor.zenwifi_bq16_ca38_wan_status'].state === 'on'; ]]]"
                              styles:
                                name:
                                  - color: "#4caf6e"
                            - operator: template
                              value: "[[[ return !states['binary_sensor.zenwifi_bq16_ca38_wan_status'] || states['binary_sensor.zenwifi_bq16_ca38_wan_status'].state !== 'on'; ]]]"
                              styles:
                                name:
                                  - color: "#e05555"
                        # Uptime
                        - type: custom:button-card
                          entity: sensor.zenwifi_bq16_ca38_uptime
                          icon: mdi:clock-outline
                          show_name: true
                          show_label: true
                          show_state: false
                          name: |
                            [[[
                              const s = states['sensor.zenwifi_bq16_ca38_uptime'];
                              if (!s) return '—';
                              const secs = parseFloat(s.state);
                              if (isNaN(secs)) return '—';
                              const d = Math.floor(secs / 86400);
                              const h = Math.floor((secs % 86400) / 3600);
                              return d + 'd ' + h + 'h';
                            ]]]
                          label: Uptime
                          styles:
                            card:
