                              - text-align: left
                              - padding-top: 4px
                            label:
                              - font-size: 10px
                              - text-transform: uppercase
                              - letter-spacing: 0.5px
                              - color: "#888"
                              - text-align: left
                            grid:
                              - grid-template-areas: '"i" "n" "l"'
                              - grid-template-rows: auto 1fr auto
                        # Throughput (combined)
                        - type: custom:button-card
