# FUSION Dashboard — through Phase 6n
# Phase 6n (bigger fonts + symmetric row margins + dynamic heights):
# - Room header font 16→18, icon 22→24. Row font 14→15, icon 18→20.
# - Row right/left margin now driven by mod-card `padding: 0 10px 11px 10px`
#   instead of row template `margin: 3px 10px`. Fix: button-card + width
#   override shrank rows to content-width; padding on the wrapper applies
#   symmetrically without interfering with button-card's internal width.
# - Room mod-card bottom padding = 11px — combined with last row's 3px
#   bottom margin, total bottom empty = 14px (matches header top padding).
# - Room min-height 180 → 120. Rooms on the same floor stretch to tallest
#   via `align-items: stretch`, so floors with only 1-row rooms (UPPER,
#   OUTSIDE) collapse to the 120px minimum. Mixed floors take the tallest.
# Phase 6m (room polish — button rows + bigger fonts + motion indicator):
# - Row template: background #1e1e1e, border 1px solid #2a2a2a,
#   border-radius 6px. Replaces the 6d border-top separator.
# - Motion rooms (Kitchen, Office, Entrance) get a Jinja-templated
#   border-left: 4px solid green (#4caf6e) when their motion sensor is on.
# Phase 6l (scale up + equal panel-edge padding):
# - Sidebar col 58→72, nav icon 42→52 (icon 20→24), statusbar 36→42,
#   KPI tile 64→78 (name 18→22, label 9→10, icon 18→20).
# - Outer layout-card `margin: 0 16px 0 -84px` → symmetric 16px outer padding
#   from the HA panel edges.
# - Status bar inner grid padding: `0 16px 0 86px` — person cell aligned
#   with Rooms Occupied KPI tile.
# - Home nav padding-top: 130 — home icon center at Main Floor divider Y.
# Phase 6j (kiosk + sidebar alignment):
# - Kiosk Mode: switched from entity_settings array to top-level template
#   pattern (matches BubbleDash). hide_header/hide_sidebar/hide_overflow
#   are each bound to `is_state('input_boolean.fusion_kiosk','on')`.
# -----------------------------------------------------------------------------
# SOURCE OF TRUTH — DO NOT EDIT VIA HA UI
# -----------------------------------------------------------------------------
