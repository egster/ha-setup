                          show_name: true
                          show_label: true
                          show_state: false
                          triggers_update:
                            - sensor.zenwifi_bq16_ca38_download_speed
                            - sensor.zenwifi_bq16_ca38_upload_speed
                          name: |
                            [[[
                              const dl = states['sensor.zenwifi_bq16_ca38_download_speed'];
                              const ul = states['sensor.zenwifi_bq16_ca38_upload_speed'];
                              const dlv = dl ? parseFloat(dl.state) : NaN;
                              const ulv = ul ? parseFloat(ul.state) : NaN;
                              const dlS = isNaN(dlv) ? '—' : dlv.toFixed(1);
                              const ulS = isNaN(ulv) ? '—' : ulv.toFixed(1);
                              return '↓ ' + dlS + ' / ↑ ' + ulS;
                            ]]]
                          label: Throughput KiB/s
                          styles:
                            card:
                              - background: "#161616"
                              - border: "1px solid #2a2a2a"
                              - border-radius: 10px
                              - padding: 14px
                              - height: 80px
                              - box-shadow: none
                            icon:
