                      cards:
                        # WAN Status
                        - type: custom:button-card
                          entity: binary_sensor.zenwifi_bq16_ca38_wan_status
                          icon: mdi:web
                          show_name: true
                          show_label: true
                          show_state: false
                          name: |
                            [[[
                              const s = states['binary_sensor.zenwifi_bq16_ca38_wan_status'];
                              return s && s.state === 'on' ? 'Online' : 'Offline';
                            ]]]
                          label: WAN Status
                          styles:
                            card:
