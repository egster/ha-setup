type: custom:layout-card
view_layout:
  grid-area: statusbar
layout_type: custom:grid-layout
layout:
  grid-template-columns: max-content max-content max-content 1fr max-content max-content max-content max-content
  grid-template-areas: '"person edphone ipad . temp wan dl ul"

    '
  grid-gap: 14px
  align-items: center
  padding: 0 16px 0 86px
  height: 42px
  background: '#000'
  border-bottom: '1px solid #222'
  box-sizing: border-box
cards:
- type: custom:button-card
  view_layout:
    grid-area: person
  entity: person.edgar
  show_icon: false
  show_state: false
  show_name: false
  show_label: true
  # WP6 — pulsing presence dot (FUSION-DESIGN-SPEC §3, BACKLOG #9). When
  # person.edgar is home, the leading "●" is rendered as an inline-block
  # span with a 2s pulse animation; when away, fall back to the "○" hollow
  # marker (no animation). Inline span + extra_styles is cleaner than the
  # brief's pulsing_presence_dot template suggestion: that template would
  # need to be positioned absolutely as a sibling overlay, but the dot
  # belongs in-line with the "Edgar · Home" text per Edgar's session
  # direction. Animation only runs when home → no battery hit when away.
  label: |
    [[[
      const s = states['person.edgar'].state;
      if (s === 'home') {
        return '<span class="fusion-presence-dot"></span> Edgar · Home';
      }
      return '○ Edgar · Away';
    ]]]
  styles:
    card:
    - background: transparent
    - border: none
    - padding: 0
    - box-shadow: none
    - height: 42px
    - width: max-content
    label:
    - font-size: 11px
    - color: '#e8e8e8'
    - white-space: nowrap
  state:
  - operator: template
    value: '[[[ return states[''person.edgar''].state === ''home''; ]]]'
    styles:
      label:
      - color: '#4caf6e'
  extra_styles: |
    .fusion-presence-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf6e;
      margin-right: 6px;
      vertical-align: middle;
      animation: fusion-presence-pulse 2s ease-in-out infinite;
    }
    @keyframes fusion-presence-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.35); }
    }
    @media (prefers-reduced-motion: reduce) {
      .fusion-presence-dot {
        animation: none;
      }
    }
