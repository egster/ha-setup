# FUSION shell — outer layout-card + sidebar.
# Restructured by WP2 (Phase 7) — content split across config/dashboards/fusion/.
# WP4 will replace this with a state-switch hybrid (sidebar on desktop/iPad,
# bottom-tab on phone). For now: verbatim relocation of the Phase 6n shell.
type: custom:layout-card
layout_type: custom:grid-layout
layout:
  grid-template-columns: 72px 1fr
  grid-template-rows: 42px 1fr
  grid-template-areas: '"statusbar statusbar"

    "sidebar content"

    '
  grid-gap: 0
  margin: 0 16px 0 -84px
  padding: 0
  min-height: 100vh
  background: '#090909'
  color: '#e8e8e8'
cards:
- !include statusbar.yaml
- type: custom:mod-card
  view_layout:
    grid-area: sidebar
  card_mod:
    style: "ha-card {\n  background: transparent;\n  border: none;\n  box-shadow: none;\n  padding-top: 130px;\n}\n"
  card:
    type: vertical-stack
    cards:
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:home-variant
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: home
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''home''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:silverware-fork-knife
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: kitchen
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''kitchen''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:thermometer
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: climate
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''climate''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:music
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: media
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''media''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:wifi
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: network
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''network''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:lightning-bolt
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: energy
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''energy''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      template: fusion_nav_icon
      icon: mdi:cog-outline
      tap_action:
        action: perform-action
        target:
          entity_id: input_select.fusion_panel
        data:
          option: automations
        perform_action: input_select.select_option
      state:
      - operator: template
        value: '[[[ return states[''input_select.fusion_panel''].state === ''automations''; ]]]'
        styles:
          card:
          - background: '#161616'
          - border: '1px solid #2a2a2a'
          icon:
          - color: '#e8e8e8'
    - type: custom:button-card
      entity: input_boolean.fusion_kiosk
      show_icon: true
      show_state: false
      show_name: false
      show_label: false
      icon: mdi:fullscreen
      tap_action:
        action: perform-action
        perform_action: input_boolean.toggle
        target:
          entity_id: input_boolean.fusion_kiosk
      styles:
        card:
        - background: transparent
        - border: 1px solid transparent
        - border-radius: 10px
        - width: 42px
        - height: 42px
        - margin: 16px 8px 0 8px
        - padding: 0
        - box-shadow: none
        - cursor: pointer
        icon:
        - width: 20px
        - height: 20px
        - color: '#888'
      state:
      - value: 'on'
        icon: mdi:fullscreen-exit
        styles:
          icon:
          - color: '#4f8ef7'
- type: vertical-stack
  view_layout:
    grid-area: content
  cards:
  - !include panels/home.yaml
  - !include panels/kitchen.yaml
  - !include panels/climate.yaml
  - !include panels/media.yaml
  - !include panels/network.yaml
  - !include panels/energy.yaml
  - !include panels/automations.yaml
  # Bubble Card popups (WP5a … WP5d): hash-routed overlay cards. Each is
  # always present in the DOM; visibility is gated by URL fragment match.
  # Order is fixed for determinism — see DECISIONS 2026-04-27 (!include shape).
  - !include popups/living-room.yaml
card_mod:
  style: ":host {\n  --primary-color: #4f8ef7;\n  --paper-item-icon-color: #888;\n  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;\n}\n:host ::-webkit-scrollbar {\n  width:\
    \ 8px;\n  height: 8px;\n}\n:host ::-webkit-scrollbar-track {\n  background: #111;\n}\n:host ::-webkit-scrollbar-thumb {\n  background: #2a2a2a;\n  border-radius: 4px;\n}\n:host ::-webkit-scrollbar-thumb:hover\
    \ {\n  background: #3a3a3a;\n}\n"
