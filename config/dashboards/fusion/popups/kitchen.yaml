---
# FUSION popup — Kitchen (WP5b, Phase 7).
#
# Hash: #popup-kitchen
# Wrapper structure replicates `_template.yaml` (see comments there for why
# duplication is preferred over !include for popup wrappers).
#
# Entity manifest (mirror of TEST-431 in fusion-tests.md):
#   light.kitchen_lights              — group (master toggle)
#   light.sunricher_hk_zd_rgbcct_a    — Kitchen Counter (Sunricher RGB+CCT)
#   light.kitchen_dimmer_keuken       — Kitchen Dimmer (Wiser ceiling)
#   light.kitchen_bijkeuken_kast      — Pantry Counter Switch (Wiser)
#   light.kitchen_bijkeuken           — Pantry Switch (Wiser)
#   climate.kitchen_area              — Wiser thermostat (heat / off)
#   binary_sensor.eve_motion_20eby9901_occupancy_2 — Kitchen Motion (Eve)
#   sensor.eve_motion_20eby9901_illuminance_2      — Kitchen Illuminance
#   media_player.kitchen              — Kitchen Sonos speaker
#   automation.kitchen_motion_light_2     — Kitchen Motion Light (day)
#   automation.kitchen_night_motion_light — Kitchen Night Motion Light
#   automation.kitchen_remote_mapping     — Kitchen Remote (Hue RWL022)
#   automation.bijkeuken_sensor_light     — Pantry Motion Light
#
# media_player.kitchen and the illuminance sensor are in-scope per the
# manifest but not yet rendered (Media section deferred to WP6+).
#
# Excluded from the popup:
#   light.kitchen_keuken_werk      — orphaned/unnamed (no friendly_name,
#                                    state=unknown, not in lights group).
#   media_player.kitchen_speakers  — duplicate, currently unavailable.
#   Miele Oven + Warming Drawer + Zocci — appliance UX deferred; not part
#                                    of WP5b's section contract.
#
# Sensors section: Kitchen has a real motion sensor (Eve) and the climate
# entity exposes `current_temperature`. Humidity has no dedicated sensor —
# renders an empty-state row per the brief's "always include the section".
#
# Scenes section: zero scenes defined for Kitchen as of WP5b. Per BACKLOG,
# the Kitchen scene definitions (Morning Brew / Cooking Mode / Dinner
# Ambience / Cleaning Mode) are blocked on a content task. Empty-state row.

type: custom:bubble-card
card_type: pop-up
hash: '#popup-kitchen'
button_type: card
icon: mdi:silverware-fork-knife
name: Kitchen
styles: |
  .bubble-popup-container {
    background: #161616 !important;
    border-top: 1px solid #2a2a2a !important;
    border-radius: 12px 12px 0 0 !important;
    padding: 16px !important;
    max-width: 700px !important;
    margin: 0 auto !important;
    color: #e8e8e8 !important;
  }
  .bubble-header-container .bubble-name {
    color: #e8e8e8 !important;
    font-size: 18px !important;
    font-weight: 600 !important;
  }
  .bubble-header-container .bubble-icon {
    color: #4f8ef7 !important;
  }
  .bubble-close-button {
    background: #1e1e1e !important;
    border: 1px solid #2a2a2a !important;
    color: #888 !important;
  }
  @media (max-width: 870px) {
    .bubble-popup-container {
      max-width: 100% !important;
      min-height: 80vh !important;
      border-radius: 12px 12px 0 0 !important;
    }
  }
cards:
  # ── Lights section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Lights
  - type: tile
    entity: light.kitchen_lights
    name: All Lights
    icon: mdi:lightbulb-group
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.sunricher_hk_zd_rgbcct_a
    name: Counter
    icon: mdi:countertop
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.kitchen_dimmer_keuken
    name: Dimmer
    icon: mdi:ceiling-light
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.kitchen_bijkeuken_kast
    name: Pantry Counter
    icon: mdi:cupboard-outline
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.kitchen_bijkeuken
    name: Pantry
    icon: mdi:wall-sconce-flat
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }

  # ── Climate section ─────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Climate
  - type: thermostat
    entity: climate.kitchen_area
    features:
      - type: climate-hvac-modes
        hvac_modes:
          - heat
          - 'off'
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          color: #e8e8e8 !important;
        }
  - type: custom:apexcharts-card
    graph_span: 24h
    header:
      show: false
    apex_config:
      chart:
        height: 120
        background: '#1e1e1e'
        toolbar:
          show: false
      grid:
        borderColor: '#2a2a2a'
        strokeDashArray: 2
      xaxis:
        labels:
          style:
            colors: '#888'
      yaxis:
        labels:
          style:
            colors: '#888'
      legend:
        labels:
          colors: '#888'
      stroke:
        width: 2
        curve: smooth
      tooltip:
        theme: dark
    series:
      - entity: climate.kitchen_area
        name: Current
        attribute: current_temperature
        color: '#4f8ef7'
      - entity: climate.kitchen_area
        name: Setpoint
        attribute: temperature
        color: '#d4a843'
        stroke_width: 1
        opacity: 0.6
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
        }

  # ── Sensors section ─────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Sensors
  - type: custom:button-card
    template: popup_row
    entity: climate.kitchen_area
    icon: mdi:thermometer
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Temperature offline';
        const t = entity.attributes.current_temperature;
        return (t !== undefined && t !== null) ? t.toFixed(1) + ' °C' : '—';
      ]]]
    tap_action:
      action: more-info
  - type: custom:button-card
    template: popup_row
    icon: mdi:water-percent
    name: 'Humidity — no sensor'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6
  - type: custom:button-card
    template: popup_row
    entity: binary_sensor.eve_motion_20eby9901_occupancy_2
    icon: mdi:motion-sensor
    name: |
      [[[
        if (!entity) return 'Motion offline';
        return entity.state === 'on' ? 'Motion detected' : 'Clear';
      ]]]
    tap_action:
      action: more-info

  # ── Scenes section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Scenes
  - type: custom:button-card
    template: popup_row
    icon: mdi:palette-outline
    name: 'No scenes defined yet — see BACKLOG'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6

  # ── Automations section ─────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Automations
  - type: tile
    entity: automation.kitchen_motion_light_2
    name: Kitchen Motion Light
    icon: mdi:motion-sensor
    features_position: bottom
    features:
      - type: toggle
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4caf6e;
        }
  - type: tile
    entity: automation.kitchen_night_motion_light
    name: Kitchen Night Motion Light
    icon: mdi:weather-night
    features_position: bottom
    features:
      - type: toggle
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4caf6e;
        }
  - type: tile
    entity: automation.kitchen_remote_mapping
    name: Kitchen Remote Mapping
    icon: mdi:remote
    features_position: bottom
    features:
      - type: toggle
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4caf6e;
        }
  - type: tile
    entity: automation.bijkeuken_sensor_light
    name: Pantry Motion Light
    icon: mdi:motion-sensor
    features_position: bottom
    features:
      - type: toggle
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4caf6e;
        }
