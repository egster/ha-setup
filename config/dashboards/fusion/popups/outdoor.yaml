# FUSION popup — Outdoor (WP5d, Phase 7).
#
# Hash: #popup-outdoor
# Wrapper structure replicates `_template.yaml` (see comments there for why
# duplication is preferred over !include for popup wrappers).
#
# Entity manifest (mirror of TEST-451 in fusion-tests.md):
#   light.outdoor_lights                        — group (entrance + garden + stairs)
#   light.philips_1744530p7                     — Outdoor Entrance Light (Hue, brightness)
#   light.philips_1744530p7_2                   — Garden Light (Hue, brightness)
#   light.philips_1744530p7_3                   — Outdoor Stairs Light (Hue, brightness)
#   switch.eve_energy_20ebo8301_2               — Party Lights (Eve Energy plug, area=Outdoor)
#   input_number.monitoring_outdoor_temperature — canonical outdoor temp (poll target)
#   weather.forecast_home                       — met.no, source for humidity / UV / wind
#   sun.sun                                     — sunrise / sunset
#
# Why no Climate section: outdoor doesn't heat. Per the WP5 popup pattern, the
# Climate slot is replaced with a Weather section (current temp tile + humidity /
# UV / wind rows + sunrise / sunset rows + 24h ApexCharts trend).
#
# Gate 1 decisions (Edgar, 2026-04-28):
#   - Outdoor temp source (display + chart): `input_number.monitoring_outdoor_temperature`.
#     Survives weather entity outages; canonical poll target per PROFILE.md (fed by
#     `automation.monitoring_temperature_poller` from `weather.forecast_home` /
#     `sensor.air_conditioning_bedroom_outside_temperature` whichever is available).
#   - Party Lights placed in Lights section as a tile alongside the Hue lights.
#   - Sunrise + sunset rendered as two rows; the next event uses accent color via
#     a state operator comparing `sun.sun.next_rising` to `next_setting`.
#
# Sensors section: outdoor area has no motion / leak / soil sensors today. Two
# empty-state rows per the brief's "always include the section" rule. The Eve
# Energy Party-Lights power-monitoring sensors (power / voltage / current / energy)
# live in the same area but are electrical metering for the switch — not
# environmental sensors — and are excluded from this section by design.
#
# Scenes section: no outdoor-tagged scenes or scripts as of 2026-04-29. Single
# empty-state row.
#
# Automations section: no outdoor-tagged automations today (no porch-on-sunset,
# no garden-lighting routine, etc.). Single empty-state row. If Edgar adds a
# sunset-trigger automation later, it can be added here without touching the
# rest of the popup.

type: custom:bubble-card
card_type: pop-up
hash: '#popup-outdoor'
button_type: card
icon: mdi:tree
name: Outdoor
styles: |
  .bubble-popup-container {
    background: #161616 !important;
    border-top: 1px solid #2a2a2a !important;
    border-radius: 12px 12px 0 0 !important;
    padding: 16px !important;
    max-width: 700px !important;
    margin: 0 auto !important;
    color: #e8e8e8 !important;
  }
  .bubble-header-container .bubble-name {
    color: #e8e8e8 !important;
    font-size: 18px !important;
    font-weight: 600 !important;
  }
  .bubble-header-container .bubble-icon {
    color: #4f8ef7 !important;
  }
  .bubble-close-button {
    background: #1e1e1e !important;
    border: 1px solid #2a2a2a !important;
    color: #888 !important;
  }
  @media (max-width: 870px) {
    .bubble-popup-container {
      max-width: 100% !important;
      min-height: 80vh !important;
      border-radius: 12px 12px 0 0 !important;
    }
  }
cards:
  # ── Lights section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Lights
  - type: tile
    entity: light.outdoor_lights
    name: All Outdoor
    icon: mdi:lightbulb-group
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.philips_1744530p7
    name: Entrance
    icon: mdi:door
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.philips_1744530p7_2
    name: Garden
    icon: mdi:flower
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.philips_1744530p7_3
    name: Stairs
    icon: mdi:stairs
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: switch.eve_energy_20ebo8301_2
    name: Party Lights
    icon: mdi:string-lights
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }

  # ── Weather section (replaces Climate for outdoor) ──────────────
  - type: custom:button-card
    template: popup_section_header
    name: Weather
  - type: tile
    entity: input_number.monitoring_outdoor_temperature
    name: Outdoor Temperature
    icon: mdi:thermometer
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4f8ef7;
        }
  - type: custom:button-card
    template: popup_row
    entity: weather.forecast_home
    icon: mdi:water-percent
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Humidity offline';
        const h = entity.attributes.humidity;
        return (h !== undefined && h !== null) ? 'Humidity ' + h + ' %' : 'Humidity —';
      ]]]
    tap_action:
      action: more-info
  - type: custom:button-card
    template: popup_row
    entity: weather.forecast_home
    icon: mdi:weather-sunny
    name: |
      [[[
        if (!entity || !entity.attributes) return 'UV offline';
        const u = entity.attributes.uv_index;
        return (u !== undefined && u !== null) ? 'UV index ' + u : 'UV —';
      ]]]
    tap_action:
      action: more-info
  - type: custom:button-card
    template: popup_row
    entity: weather.forecast_home
    icon: mdi:weather-windy
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Wind offline';
        const w = entity.attributes.wind_speed;
        const u = entity.attributes.wind_speed_unit || 'km/h';
        return (w !== undefined && w !== null) ? 'Wind ' + w + ' ' + u : 'Wind —';
      ]]]
    tap_action:
      action: more-info
  - type: custom:button-card
    template: popup_row
    entity: sun.sun
    icon: mdi:weather-sunset-up
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Sunrise —';
        const r = entity.attributes.next_rising;
        if (!r) return 'Sunrise —';
        const d = new Date(r);
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return 'Sunrise ' + hh + ':' + mm;
      ]]]
    tap_action:
      action: more-info
    state:
      - operator: template
        value: |
          [[[
            if (!entity || !entity.attributes) return false;
            const r = new Date(entity.attributes.next_rising);
            const s = new Date(entity.attributes.next_setting);
            return r < s;
          ]]]
        styles:
          icon:
            - color: '#d4a843'
          name:
            - color: '#d4a843'
  - type: custom:button-card
    template: popup_row
    entity: sun.sun
    icon: mdi:weather-sunset-down
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Sunset —';
        const s = entity.attributes.next_setting;
        if (!s) return 'Sunset —';
        const d = new Date(s);
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        return 'Sunset ' + hh + ':' + mm;
      ]]]
    tap_action:
      action: more-info
    state:
      - operator: template
        value: |
          [[[
            if (!entity || !entity.attributes) return false;
            const r = new Date(entity.attributes.next_rising);
            const s = new Date(entity.attributes.next_setting);
            return s < r;
          ]]]
        styles:
          icon:
            - color: '#d4a843'
          name:
            - color: '#d4a843'
  - type: custom:apexcharts-card
    graph_span: 24h
    header:
      show: false
    apex_config:
      chart:
        height: 120
        background: '#1e1e1e'
        toolbar:
          show: false
      grid:
        borderColor: '#2a2a2a'
        strokeDashArray: 2
      xaxis:
        labels:
          style:
            colors: '#888'
      yaxis:
        labels:
          style:
            colors: '#888'
      legend:
        labels:
          colors: '#888'
      stroke:
        width: 2
        curve: smooth
      tooltip:
        theme: dark
    series:
      - entity: input_number.monitoring_outdoor_temperature
        name: Outdoor
        color: '#4f8ef7'
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
        }

  # ── Sensors section ─────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Sensors
  - type: custom:button-card
    template: popup_row
    icon: mdi:motion-sensor
    name: 'Motion — no sensor'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6
  - type: custom:button-card
    template: popup_row
    icon: mdi:water-outline
    name: 'Leak / soil — no sensor'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6

  # ── Scenes section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Scenes
  - type: custom:button-card
    template: popup_row
    icon: mdi:palette-outline
    name: 'No scenes defined for this room'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6

  # ── Automations section ─────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Automations
  - type: custom:button-card
    template: popup_row
    icon: mdi:robot-outline
    name: 'No automations defined for this room'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6
