# FUSION popup — Living Room (WP5a, Phase 7).
#
# Hash: #popup-living-room
# Wrapper structure replicates `_template.yaml` (see comments there for why
# duplication is preferred over !include for popup wrappers).
#
# Entity manifest (mirror of TEST-402 in fusion-tests.md):
#   light.living_room_lights              — group (master toggle)
#   light.uplight_front                   — Hue (currently unavailable)
#   light.uplight_back_left               — Hue (currently unavailable)
#   light.uplight_back_right              — Hue (currently unavailable)
#   light.living_room_light_woonkamer     — Wiser ceiling light switch
#   light.living_room_dimmer_woonkamer    — Wiser table dimmer
#   climate.living_room_area              — Wiser thermostat (heat / off)
#   media_player.living_room              — Sonos Arc surround
#   media_player.homepod                  — Apple HomePod
#   media_player.living_room_tv_2         — VisionMaster Pro projector
#   script.lr_relax                       — Living Room Relax scene
#   script.movie_mode                     — Movie Mode scene
#   scene.lights_off                      — global all-off scene
#   automation.living_room_remote_mapping — IKEA 5-button remote bindings
#
# Why scenes are scripts, not scenes: lr_relax + movie_mode are written as
# scripts (one-shot action sequences); scene.lights_off is the only true
# scene (all-off snapshot). The popup treats them uniformly via more-info /
# script.turn_on / scene.turn_on tap_actions.
#
# Sensors section: Living Room has no dedicated motion / temperature /
# humidity sensors — the Wiser climate entity exposes `current_temperature`
# as an attribute, used as the temperature row source. Humidity renders an
# empty-state row per the brief's "always include the section" rule.

type: custom:bubble-card
card_type: popup
hash: '#popup-living-room'
button_type: card
icon: mdi:sofa
name: Living Room
styles: |
  .bubble-popup-container {
    background: #161616 !important;
    border-top: 1px solid #2a2a2a !important;
    border-radius: 12px 12px 0 0 !important;
    padding: 16px !important;
    max-width: 700px !important;
    margin: 0 auto !important;
    color: #e8e8e8 !important;
  }
  .bubble-header-container .bubble-name {
    color: #e8e8e8 !important;
    font-size: 18px !important;
    font-weight: 600 !important;
  }
  .bubble-header-container .bubble-icon {
    color: #4f8ef7 !important;
  }
  .bubble-close-button {
    background: #1e1e1e !important;
    border: 1px solid #2a2a2a !important;
    color: #888 !important;
  }
  @media (max-width: 870px) {
    .bubble-popup-container {
      max-width: 100% !important;
      min-height: 80vh !important;
      border-radius: 12px 12px 0 0 !important;
    }
  }
cards:
  # ── Lights section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Lights
  - type: tile
    entity: light.living_room_lights
    name: All Lights
    icon: mdi:lightbulb-group
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.uplight_front
    name: Uplight Front
    icon: mdi:wall-sconce-flat
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.uplight_back_left
    name: Uplight Back Left
    icon: mdi:wall-sconce-flat
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.uplight_back_right
    name: Uplight Back Right
    icon: mdi:wall-sconce-flat
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.living_room_light_woonkamer
    name: Ceiling
    icon: mdi:ceiling-light
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }
  - type: tile
    entity: light.living_room_dimmer_woonkamer
    name: Table
    icon: mdi:table-furniture
    features_position: bottom
    features:
      - type: light-brightness
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #d4a843;
        }

  # ── Climate section ─────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Climate
  - type: thermostat
    entity: climate.living_room_area
    features:
      - type: climate-hvac-modes
        hvac_modes:
          - heat
          - 'off'
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          color: #e8e8e8 !important;
        }
  - type: custom:apexcharts-card
    graph_span: 24h
    header:
      show: false
    apex_config:
      chart:
        height: 120
        background: '#1e1e1e'
        toolbar:
          show: false
      grid:
        borderColor: '#2a2a2a'
        strokeDashArray: 2
      xaxis:
        labels:
          style:
            colors: '#888'
      yaxis:
        labels:
          style:
            colors: '#888'
      legend:
        labels:
          colors: '#888'
      stroke:
        width: 2
        curve: smooth
      tooltip:
        theme: dark
    series:
      - entity: climate.living_room_area
        name: Current
        attribute: current_temperature
        color: '#4f8ef7'
      - entity: climate.living_room_area
        name: Setpoint
        attribute: temperature
        color: '#d4a843'
        stroke_width: 1
        opacity: 0.6
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
        }

  # ── Sensors section ─────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Sensors
  - type: custom:button-card
    template: popup_row
    entity: climate.living_room_area
    icon: mdi:thermometer
    name: |
      [[[
        if (!entity || !entity.attributes) return 'Temperature offline';
        const t = entity.attributes.current_temperature;
        return (t !== undefined && t !== null) ? t.toFixed(1) + ' °C' : '—';
      ]]]
    tap_action:
      action: more-info
  - type: custom:button-card
    template: popup_row
    icon: mdi:water-percent
    name: 'Humidity — no sensor'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6
  - type: custom:button-card
    template: popup_row
    icon: mdi:motion-sensor
    name: 'Motion — no sensor'
    tap_action:
      action: none
    styles:
      card:
        - background: '#1e1e1e'
        - border: '1px solid #2a2a2a'
        - border-radius: 6px
        - padding: 10px 12px
        - margin: 0 0 6px 0
        - box-shadow: none
        - cursor: default
        - height: auto
        - opacity: 0.6

  # ── Scenes section ──────────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Scenes
  - type: custom:button-card
    template: popup_row
    entity: script.movie_mode
    icon: mdi:movie-open
    name: Movie Mode
    tap_action:
      action: perform-action
      perform_action: script.turn_on
      target:
        entity_id: script.movie_mode
  - type: custom:button-card
    template: popup_row
    entity: script.lr_relax
    icon: mdi:sofa
    name: Living Room Relax
    tap_action:
      action: perform-action
      perform_action: script.turn_on
      target:
        entity_id: script.lr_relax
  - type: custom:button-card
    template: popup_row
    entity: scene.lights_off
    icon: mdi:lightbulb-off-outline
    name: Lights Off
    tap_action:
      action: perform-action
      perform_action: scene.turn_on
      target:
        entity_id: scene.lights_off

  # ── Automations section ─────────────────────────────────────────
  - type: custom:button-card
    template: popup_section_header
    name: Automations
  - type: tile
    entity: automation.living_room_remote_mapping
    name: Living Room Remote Mapping
    icon: mdi:remote
    features_position: bottom
    features:
      - type: toggle
    card_mod:
      style: |
        ha-card {
          background: #1e1e1e !important;
          border: 1px solid #2a2a2a !important;
          border-radius: 6px !important;
          margin-bottom: 6px !important;
          --tile-color: #4caf6e;
        }
