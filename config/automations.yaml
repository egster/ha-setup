- id: '1775852230350'
  alias: Beamer — Uplight Front
  description: When the beamer turns on and Uplight Front is on, remember that and
    turn it off. When the beamer turns off, restore Uplight Front if it was on before.
    Uses input_boolean.uplight_front_beamer_restore to track prior state.
  triggers:
  - platform: state
    entity_id: media_player.living_room_tv_2
    from: 'off'
    id: beamer_on
  - platform: state
    entity_id: media_player.living_room_tv_2
    to: 'off'
    id: beamer_off
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: beamer_on
      - condition: state
        entity_id: light.uplight_front
        state: 'on'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.uplight_front_beamer_restore
      - action: light.turn_off
        target:
          entity_id: light.uplight_front
    - conditions:
      - condition: trigger
        id: beamer_off
      - condition: state
        entity_id: input_boolean.uplight_front_beamer_restore
        state: 'on'
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.uplight_front
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.uplight_front_beamer_restore
  mode: single
- id: '1775889176884'
  alias: Monitoring — Temperature Poller
  description: Updates room temperature helpers every 10 minutes from Wiser thermostat
    readings and weather.forecast_home. Only writes when the source is available AND
    the value has actually changed — prevents unnecessary recorder writes on a resource-constrained
    Green board.
  triggers:
  - platform: time_pattern
    minutes: /10
  actions:
  - if:
    - condition: template
      value_template: '{{ state_attr(''climate.office_area'', ''current_temperature'')
        is not none and (state_attr(''climate.office_area'', ''current_temperature'')
        | float) != (states(''input_number.monitoring_office_temperature'') | float)
        }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.monitoring_office_temperature
      data:
        value: '{{ state_attr(''climate.office_area'', ''current_temperature'') |
          float }}'
  - if:
    - condition: template
      value_template: '{{ state_attr(''climate.living_room_area'', ''current_temperature'')
        is not none and (state_attr(''climate.living_room_area'', ''current_temperature'')
        | float) != (states(''input_number.monitoring_living_room_temperature'') |
        float) }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.monitoring_living_room_temperature
      data:
        value: '{{ state_attr(''climate.living_room_area'', ''current_temperature'')
          | float }}'
  - if:
    - condition: template
      value_template: '{{ state_attr(''climate.kitchen_area'', ''current_temperature'')
        is not none and (state_attr(''climate.kitchen_area'', ''current_temperature'')
        | float) != (states(''input_number.monitoring_kitchen_temperature'') | float)
        }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.monitoring_kitchen_temperature
      data:
        value: '{{ state_attr(''climate.kitchen_area'', ''current_temperature'') |
          float }}'
  - if:
    - condition: template
      value_template: '{{ state_attr(''weather.forecast_home'', ''temperature'') is
        not none and (state_attr(''weather.forecast_home'', ''temperature'') | float)
        != (states(''input_number.monitoring_outdoor_temperature'') | float) }}'
    then:
    - action: input_number.set_value
      target:
        entity_id: input_number.monitoring_outdoor_temperature
      data:
        value: '{{ state_attr(''weather.forecast_home'', ''temperature'') | float
          }}'
  mode: single
- id: '1776071743294'
  alias: Zocci – Deep Clean Reminder
  description: When coffees hit a multiple of 50, sends an immediate notification
    and flags that a deep clean is needed.
  triggers:
  - platform: template
    value_template: '{% set count = states(''sensor.zocci_total_coffees_made'') |
      int(0) %}

      {{ count > 0 and count % 50 == 0 }}'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.zocci_deep_clean_needed
  - action: notify.mobile_app_edphone
    data:
      title: ☕ Zocci – Deep Clean Required
      message: '{{ states(''sensor.zocci_total_coffees_made'') }} coffees made. Time
        to deep clean the Zocci!'
  mode: single
- id: '1776073051943'
  alias: Zocci – Mark Clean Done
  description: When the Zocci records a new last_cleaning_time, clear the deep-clean-needed
    flag.
  triggers:
  - platform: state
    entity_id: sensor.zocci_last_cleaning_time
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.state not in [''unknown'', ''unavailable'']
      }}'
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.zocci_deep_clean_needed
  mode: single
- id: '1776073068482'
  alias: Zocci – Daily Clean Reminder
  description: Every morning at 08:00, if a deep clean is still outstanding, send
    a reminder.
  triggers:
  - platform: time
    at: 08:00:00
  conditions:
  - condition: state
    entity_id: input_boolean.zocci_deep_clean_needed
    state: 'on'
  actions:
  - action: notify.mobile_app_edphone
    data:
      title: ☕ Zocci – Deep Clean Still Needed
      message: 'Reminder: the Zocci needs a deep clean ({{ states(''sensor.zocci_total_coffees_made'')
        }} coffees made).'
  mode: single
- id: '1776090257789'
  alias: Vacation Mode – Activate
  description: 'When vacation mode is switched on: snapshot current heating targets,
    set all zones to 16°C (frost protection), and notify Edgar. Zocci must be disabled
    manually in the La Marzocco app (API does not support remote control).'
  triggers:
  - entity_id: input_boolean.vacation_mode
    to: 'on'
    platform: state
  conditions: []
  actions:
  - alias: Snapshot current heating states for later restore
    action: scene.create
    data:
      scene_id: vacation_mode_heating_restore
      snapshot_entities:
      - climate.office_area
      - climate.living_room_area
      - climate.kitchen_area
  - alias: Set Office to 16°C
    action: climate.set_temperature
    target:
      entity_id: climate.office_area
    data:
      temperature: 16
  - alias: Set Living Room to 16°C
    action: climate.set_temperature
    target:
      entity_id: climate.living_room_area
    data:
      temperature: 16
  - alias: Set Kitchen to 16°C
    action: climate.set_temperature
    target:
      entity_id: climate.kitchen_area
    data:
      temperature: 16
  - alias: Notify – Vacation mode activated
    action: notify.mobile_app_edphone
    data:
      title: Vacation Mode On
      message: 'Heating set to 16°C in all zones. Mode ends: {{ states(''input_datetime.vacation_mode_end'')
        }}. ⚠️ Disable the Zocci auto schedule manually in the La Marzocco app.'
  mode: single
- id: '1776090277293'
  alias: Vacation Mode – End
  description: Fires at the configured vacation end date/time. Simply turns vacation
    mode off — the Vacation Mode Deactivate automation handles restoration and notification
    for both this path and manual cancellation.
  triggers:
  - trigger: time
    at: input_datetime.vacation_mode_end
  conditions:
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'on'
  actions:
  - alias: Turn vacation mode off — triggers Deactivate automation
    action: input_boolean.turn_off
    target:
      entity_id: input_boolean.vacation_mode
  mode: single
- id: '1776091280740'
  alias: Vacation Mode – Deactivate
  description: Fires whenever vacation mode is turned off (manually or by the End
    automation). Restores heating to pre-vacation states and notifies Edgar. Zocci
    schedule must be re-enabled manually in the La Marzocco app (API does not support
    remote control).
  triggers:
  - entity_id: input_boolean.vacation_mode
    to: 'off'
    platform: state
  conditions: []
  actions:
  - alias: Restore heating to pre-vacation states
    action: scene.turn_on
    target:
      entity_id: scene.vacation_mode_heating_restore
    continue_on_error: true
  - alias: Notify – Vacation mode ended
    action: notify.mobile_app_edphone
    data:
      title: Vacation Mode Off
      message: Welcome back! Heating restored to pre-vacation settings. ⚠️ Remember
        to re-enable the Zocci schedule in the La Marzocco app.
  mode: single
- id: '1776091296974'
  alias: Vacation Mode – Zocci Warning
  description: While vacation mode is active, if Zocci turns on (schedule fired despite
    vacation mode), send a push notification warning Edgar to disable the schedule
    in the La Marzocco app.
  triggers:
  - trigger: state
    entity_id: switch.zocci
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'on'
  actions:
  - alias: Notify – Zocci turned on during vacation
    action: notify.mobile_app_edphone
    data:
      title: ⚠️ Zocci On During Vacation
      message: Zocci has turned on while vacation mode is active. Please disable the
        auto on/off schedule in the La Marzocco app.
  mode: single
- id: '1776189556144'
  alias: Late Night Light Shutoff — No Motion Check
  description: Turns off kitchen, living room, and office lights at 23:00 and 00:00
    if no motion has been detected in any monitored area for the past 30 minutes.
    Uses Kitchen and Office sensors directly; Entrance and Hall/Upstairs sensors as
    proxies for the Living Room (which has no dedicated motion sensor).
  triggers:
  - platform: time
    at: '23:00:00'
  - platform: time
    at: 00:00:00
  conditions:
  - condition: template
    value_template: "{{\n  (states['binary_sensor.eve_motion_20eby9901_occupancy_2'].state
      == 'off' and\n   (now() - states['binary_sensor.eve_motion_20eby9901_occupancy_2'].last_changed).total_seconds()
      > 1800) and\n  (states['binary_sensor.office_motion_sensors'].state == 'off'
      and\n   (now() - states['binary_sensor.office_motion_sensors'].last_changed).total_seconds()
      > 1800) and\n  (states['binary_sensor.entrance_motion_sensors'].state == 'off'
      and\n   (now() - states['binary_sensor.entrance_motion_sensors'].last_changed).total_seconds()
      > 1800) and\n  (states['binary_sensor.eve_motion_20eby9901_occupancy'].state
      == 'off' and\n   (now() - states['binary_sensor.eve_motion_20eby9901_occupancy'].last_changed).total_seconds()
      > 1800)\n}}"
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
      - light.living_room_lights
      - light.office_lights
  mode: single
